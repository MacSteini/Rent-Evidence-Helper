name: Refresh ONS rent benchmark data

on:
  schedule:
    - cron: "17 7 18-24 * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ons-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh ONS PIPR artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ingest script tests
        run: npm run test:ingest

      - name: Refresh ONS PIPR data
        run: npm run ingest:ons:pipr -- --update-release-metadata

      - name: Stop if ONS data is unchanged
        id: diff
        run: |
          if git diff --quiet -- src/data/official-rent-benchmarks.json CHANGELOG.md public/sitemap.xml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.diff.outputs.changed == 'true'
        run: npm test

      - name: Run typecheck
        if: steps.diff.outputs.changed == 'true'
        run: npm run typecheck

      - name: Run build
        if: steps.diff.outputs.changed == 'true'
        run: npm run build

      - name: Check diff whitespace
        if: steps.diff.outputs.changed == 'true'
        run: git diff --check

      - name: Commit refreshed ONS data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/official-rent-benchmarks.json CHANGELOG.md public/sitemap.xml
          git commit -m "Refresh ONS rent benchmark data"
          git push
