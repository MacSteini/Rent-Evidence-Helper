name: Refresh ONS rent benchmark data

on:
  schedule:
    - cron: "17 7 18-24 * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ons-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh ONS PIPR artifact
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ingest script tests
        run: npm run test:ingest

      - name: Refresh ONS PIPR data
        run: npm run ingest:ons:pipr -- --update-release-metadata

      - name: Stop if ONS data is unchanged
        id: diff
        run: |
          if git diff --quiet -- src/data/official-rent-benchmarks.json CHANGELOG.md public/sitemap.xml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce allowed data-refresh diff scope
        if: steps.diff.outputs.changed == 'true'
        run: |
          unexpected=""
          while IFS= read -r file; do
            case "$file" in
              CHANGELOG.md|public/sitemap.xml|src/data/official-rent-benchmarks.json) ;;
              *) unexpected="${unexpected}${file}\n" ;;
            esac
          done < <(git diff --name-only)
          if [ -n "$unexpected" ]; then
            printf 'Unexpected data-refresh files changed:\n%b' "$unexpected"
            exit 1
          fi

      - name: Run tests
        if: steps.diff.outputs.changed == 'true'
        run: npm test

      - name: Run typecheck
        if: steps.diff.outputs.changed == 'true'
        run: npm run typecheck

      - name: Run build
        if: steps.diff.outputs.changed == 'true'
        run: npm run build

      - name: Check diff whitespace
        if: steps.diff.outputs.changed == 'true'
        run: git diff --check

      - name: Commit refreshed ONS data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/official-rent-benchmarks.json CHANGELOG.md public/sitemap.xml
          git commit -m "Refresh ONS rent benchmark data"
          git push origin HEAD:${{ github.ref_name }}

      - name: Configure GitHub Pages
        if: steps.diff.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy refreshed Pages artifact
        if: steps.diff.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
